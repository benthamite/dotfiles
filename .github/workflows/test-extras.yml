name: Test Emacs extras

on:
  push:
    paths:
      - 'emacs/extras/**'
      - '.github/workflows/test-extras.yml'
  pull_request:
    paths:
      - 'emacs/extras/**'
      - '.github/workflows/test-extras.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.4']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # master 2026-04-05
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install MELPA packages
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(dolist (pkg '(el-patch shut-up ebib magit forge consult
                                  org-noter org-pomodoro read-aloud
                                  ledger-mode gptel no-littering
                                  doom-modeline orderless markdown-mode
                                  vulpea anki-editor aidermacs zotra
                                  f s inheritenv))
                      (condition-case err
                          (unless (package-installed-p pkg)
                            (package-install pkg))
                        (error (message \"Warning: could not install %s: %s\" pkg err))))"

      - name: Clone non-MELPA packages
        run: |
          mkdir -p vendor
          git init vendor/annas-archive
          git -C vendor/annas-archive fetch --depth 1 https://github.com/benthamite/annas-archive.git 9b4eecc73a73dee7845f45b343f8ec4354e93138
          git -C vendor/annas-archive checkout FETCH_HEAD
          git init vendor/claude-code
          git -C vendor/claude-code fetch --depth 1 https://github.com/stevemolitor/claude-code.el.git 4a9914bd4161eb43f489820f9174c62390e5adc8
          git -C vendor/claude-code checkout FETCH_HEAD

      - name: Run tests
        env:
          EXTRA_LOAD_PATHS: vendor/annas-archive:vendor/claude-code
        run: bash emacs/extras/test/run-tests.sh --ci
